name: CI with PostgreSQL

on:
  push:
    branches: [ "dev" ]
  pull_request:
    branches: [ "dev" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # Define the PostgreSQL service container
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: sjm_postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: pass1234
        ports:
          # Maps port 5432 on the service container to port 5432 on the runner host
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Wait for PostgreSQL to be ready (optional, but recommended)
      # The 'services' health check in the 'options' above handles this, 
      # but this step provides an explicit wait within the main job's execution flow if needed.
      run: |
        while ! pg_isready -h localhost -p 5432; do
          sleep 2
        done
      # The `ubuntu-latest` runner has psql pre-installed

    - name: Display PostgreSQL version
      env:
        POSTGRES_PASSWORD: pass1234
      run: psql -h localhost -U postgres -c "SELECT 1" 


    - name: Run application tests
      # Replace with your actual test command (e.g., 'npm test', 'pytest', 'dotnet test')
      run: echo "Running application tests that connect to the database..."