name: CI SimpleJdbcMapper

on:
  workflow_dispatch:

jobs:
  tests-against-postgres:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: sjm_postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: pass1234
        ports:
          # Maps service port to port on the runner host
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'corretto'
        cache: maven
        
    # dont want the step of running tests be polluted by dependency downloads
    - name: Download dependencies and plugins
      run: mvn dependency:go-offline dependency:resolve dependency:resolve-plugins
      
    - name: Run tests against postgres
      run: mvn clean package -Dspring.profiles.active=postgres -Dmaven.javadoc.skip=true

  tests-against-mysql:
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: sjm_mysql
          MYSQL_ALLOW_EMPTY_PASSWORD: "yes"

        # Maps service port to port on the runner host
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'corretto'
        cache: maven

    # dont want the step of running tests be polluted by dependency downloads
    - name: Download dependencies and plugins
      run: mvn dependency:go-offline dependency:resolve dependency:resolve-plugins
      
    - name: Run tests against mysql
      run: mvn clean package -Dspring.profiles.active=mysql -Dmaven.javadoc.skip=true
      
  tests-against-oracle:
    runs-on: ubuntu-latest
    
    services:
      # Oracle service (label used to access the service container)
      oracle:
        image: gvenzl/oracle-free:latest
        
        # Provide passwords and other environment variables to container
        env:
          ORACLE_PASSWORD: pass1234
          APP_USER: SCHEMA1
          APP_USER_PASSWORD: app
 
        # Maps service port to port on the runner host
        ports:
          - 1521:1521

        # Provide container name and healthcheck script options for startup
        options: >-
          --name oracle-db 
          --health-cmd healthcheck.sh
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:       
    - name: Checkout code
      uses: actions/checkout@v6
       
    - name: initialize oracle setup
      run: |
        docker cp src/test/resources/db/oracle_setup.sql oracle-db:/tmp/oracle_setup.sql
        docker exec oracle-db sqlplus system/pass1234@FREEPDB1 @/tmp/oracle_setup.sql  
       
    - name: Set up JDK 21
      uses: actions/setup-java@v5        
      with:
        java-version: '21'
        distribution: 'corretto'
        cache: maven
        
    # dont want the step of running tests be polluted by dependency downloads                
    - name: Download dependencies and plugins
      run: mvn dependency:go-offline dependency:resolve dependency:resolve-plugins
      
    - name: Run tests against oracle
      run: mvn clean package -Dspring.profiles.active=oracle -Dmaven.javadoc.skip=true
    
    # Running coverage for Oracle only at this time since it goes through most code
    # This will create badge in .github/badges
    - name: Generate Jacoco Badge
      id: jacoco
      uses: cicirello/jacoco-badge-generator@v2
      with:
        # Example: Green for >= 90%, Yellow for >= 75%, Red for < 75%
        colors: 'green yellow red'
        intervals: 90 75

    - name: Log coverage percentage
      run: echo "coverage = ${{ steps.jacoco.outputs.coverage }}"

    - name: Commit and push the coverage badges and summary file
      if: ${{ github.event_name != 'pull_request' }}
      run: |
        cd .github/badges
        if [[ `git status --porcelain *.svg` ]]; then
          git config --global user.name 'github-actions' # default user name for checkin
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com' #default email for checkin
          git add *.svg
          git commit -m "Autogenerated JaCoCo coverage badges" *.svg
          git push
        fi
       
  tests-against-sqlserver:
    runs-on: ubuntu-latest
    
    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: 'Y'
          MSSQL_SA_PASSWORD: Mssql123
          
        # Maps service port to port on the runner host 
        ports:
          - 1433:1433
          
        # Health check ensures the service is ready before steps run
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P 'Mssql123' -Q 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'corretto'
        cache: maven
      
    - name: Initialize SQL Server setup
      uses: azure/sql-action@v2.3
      with:
        connection-string: Server=tcp:localhost,1433;Initial Catalog=master;User ID=sa;Password=Mssql123;Encrypt=True;TrustServerCertificate=True;Connection Timeout=30;
        path: ./src/test/resources/db/sqlserver_setup.sql
        
    # dont want the step of running tests be polluted by dependency downloads
    - name: Download dependencies and plugins
      run: mvn dependency:go-offline dependency:resolve dependency:resolve-plugins
                 
    - name: Run tests against SQLServer
      run: mvn clean package -Dspring.profiles.active=sqlserver -Dmaven.javadoc.skip=true       

  