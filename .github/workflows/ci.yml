name: CI for SimpleJdbcMapper

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'README.md'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - 'README.md'

jobs:
  tests-against-postgres:
    runs-on: ubuntu-latest

    # Define the PostgreSQL service container
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: sjm_postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: pass1234
        ports:
          # Maps port 5432 on the service container to port 5432 on the runner host
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Wait for PostgreSQL to be ready (optional, but recommended)
      # The 'services' health check in the 'options' above handles this, 
      # but this step provides an explicit wait within the main job's execution flow if needed.
      run: |
        while ! pg_isready -h localhost -p 5432; do
          sleep 2
        done

    - name: Set up JDK 21
      uses: actions/setup-java@v5 # Action to set up the Java environment 
      with:
        java-version: '21' # Specify the Java version required for the Spring project
        distribution: 'corretto' # Choose a JDK distribution (e.g., temurin, corretto, zulu)
        cache: maven # Enables caching of Maven dependencies to speed up subsequent runs

    - name: Run tests against postgres
      run: mvn clean package -Dspring.profiles.active=postgres -Dmaven.javadoc.skip=true

  tests-against-mysql:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: sjm_mysql
          MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up JDK 21
      uses: actions/setup-java@v5 # Action to set up the Java environment 
      with:
        java-version: '21' # Specify the Java version required for the Spring project
        distribution: 'corretto' # Choose a JDK distribution (e.g., temurin, corretto, zulu)
        cache: maven # Enables caching of Maven dependencies to speed up subsequent runs

    - name: Run tests against mysql
      run: mvn clean package -Dspring.profiles.active=mysql -Dmaven.javadoc.skip=true
      
  tests-against-oracle:
    runs-on: ubuntu-latest

    services:
      # Oracle service (label used to access the service container)
      oracle:
        # Docker Hub image (feel free to change the tag "latest" to any other available one)
        image: gvenzl/oracle-free:latest

        # Provide passwords and other environment variables to container
        env:
          #ORACLE_DATABASE: MYPDB
          ORACLE_PASSWORD: pass1234
          APP_USER: SCHEMA1
          APP_USER_PASSWORD: app
 
        # Forward Oracle port
        ports:
          - 1521:1521

        # Provide container name and healthcheck script options for startup
        options: >-
          --name oracle-db 
          --health-cmd healthcheck.sh
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:       
     - name: Checkout code
       uses: actions/checkout@v6
       
     - name: copy oracle setup script
       run: docker cp src/test/resources/db/oracle_setup.sql oracle-db:/tmp/oracle_setup.sql
       
     - name: execute oracle setup script
       run: docker exec oracle-db sqlplus system/pass1234@FREEPDB1 @/tmp/oracle_setup.sql   
       
     - name: Set up JDK 21
       uses: actions/setup-java@v5 # Action to set up the Java environment 
       with:
         java-version: '21' # Specify the Java version required for the Spring project
         distribution: 'corretto' # Choose a JDK distribution (e.g., temurin, corretto, zulu)
         cache: maven # Enables caching of Maven dependencies to speed up subsequent runs
            
     - name: Run tests against oracle
       run: mvn clean package -Dspring.profiles.active=oracle -Dmaven.javadoc.skip=true
     
  tests-against-sqlserver:
    runs-on: ubuntu-latest
    
    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: 'Y'
          MSSQL_SA_PASSWORD: Mssql123
        ports:
          - 1433:1433
        # Health check ensures the service is ready before steps run
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P 'Mssql123' -Q 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5 # Action to set up the Java environment 
        with:
          java-version: '21' # Specify the Java version required for the Spring project
          distribution: 'corretto' # Choose a JDK distribution (e.g., temurin, corretto, zulu)
          cache: maven # Enables caching of Maven dependencies to speed up subsequent runs
      
      - name: Initialize SQL Server
        uses: azure/sql-action@v2.3
        with:
            connection-string: Server=tcp:localhost,1433;Initial Catalog=master;User ID=sa;Password=Mssql123;Encrypt=True;TrustServerCertificate=True;Connection Timeout=30;
            path: ./src/test/resources/db/sqlserver_setup.sql
           
      - name: Run tests against SQLServer
        run: mvn clean package -Dspring.profiles.active=sqlserver -Dmaven.javadoc.skip=true       

  