name: CI for SimpleJdbcMapper

on:
  push:
    branches: [ "dev" ]
    paths-ignore:
      - 'README.md'
  pull_request:
    branches: [ "dev" ]
    paths-ignore:
      - 'README.md'

jobs:
  tests-against-oracle:
    runs-on: ubuntu-latest

    services:
      # Oracle service (label used to access the service container)
      oracle:
        # Docker Hub image (feel free to change the tag "latest" to any other available one)
        image: gvenzl/oracle-free:latest

        # Provide passwords and other environment variables to container
        env:
          #ORACLE_DATABASE: MYPDB
          ORACLE_PASSWORD: pass1234
          APP_USER: SCHEMA1
          APP_USER_PASSWORD: app
 
        # Forward Oracle port
        ports:
          - 1521:1521

        # Provide container name and healthcheck script options for startup
        options: >-
          --name oracle-db 
          --health-cmd healthcheck.sh
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        #volumes:  
        #  - ${{ github.workspace }}/src/test/resources/db/oracle_setup.sql:/container-entrypoint-initdb.d/oracle_setup.sql:ro
    steps:
     #- name: create SCHEMA2 user
     #  run: docker exec oracle-db createAppUser SCHEMA2 app
          
     - name: Checkout code
       uses: actions/checkout@v6
       
     - name: copy setup file
       run: docker cp src/test/resources/db/oracle_setup.sql oracle-db:/tmp/oracle_setup.sql
       
     - name: Execute the script
       run: docker exec -it oracle-db sqlplus system/pass1234@FREEPDB1 @/tmp/oracle_setup.sql   
       
     - name: Set up JDK 21
       uses: actions/setup-java@v5 # Action to set up the Java environment 
       with:
         java-version: '21' # Specify the Java version required for the Spring project
         distribution: 'corretto' # Choose a JDK distribution (e.g., temurin, corretto, zulu)
         cache: maven # Enables caching of Maven dependencies to speed up subsequent runs


     #- name: Run SQL script
     # run: sql username/password@host:port/service @src/test/resources/db/oracle_setup.sql


     #- name: Install Oracle SQLcl
     #  uses: gvenzl/setup-oracle-sqlcl@v1
       
     #- name: Run SQL Script
     #  run: |
     #       sql system/pass1234@localhost:1521/FREEPDB1 @src/test/resources/db/oracle_setup.sql
            
            
     #- name: Run tests against oracle
     #  run: mvn clean package -Dspring.profiles.active=oracle -Dmaven.javadoc.skip=true
      
      #run: mvn clean test -Dtest=TableAnnotationWithSchemaTest -Dspring.profiles.active=oracle 
      
